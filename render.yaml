# Render Static Site deployment
# Service name: augustines  →  Live URL: https://augustines.onrender.com

services:
  - type: web
    name: augustines
    runtime: static
    buildCommand: echo "No build step — static site"
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
