<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid meet" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#BFA133" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="hatch-new" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#0A0A0A" stroke-width="0.6" opacity="0.5"/>
    </pattern>
  </defs>
  
  <!-- Sheet title -->
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0A0A0A">SITE PLAN — TOP DOWN</text>
  <text x="400" y="65" text-anchor="middle" font-size="13" fill="#6B5F4F">213-215 Halstead Avenue, Mamaroneck NY 10543  |  Scale 1" = 10'</text>
  
  <!-- Streets -->
  <rect x="60" y="100" width="680" height="50" fill="#E5E5E5"/>
  <text x="400" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#6B5F4F">HALSTEAD AVENUE (~8,000 vehicles/day)</text>
  <line x1="60" y1="160" x2="740" y2="160" stroke="#0A0A0A" stroke-width="2"/>
  
  <!-- Sidewalk -->
  <rect x="60" y="160" width="680" height="20" fill="#FAF6F0" stroke="#6B5F4F" stroke-width="0.5"/>
  <text x="400" y="174" text-anchor="middle" font-size="9" fill="#6B5F4F" font-style="italic">SIDEWALK</text>
  
  <!-- Property line - LOT (25' x 104') scaled  -->
  <!-- Property width 25 ft = 250 px; depth 104 ft = 520 px -->
  <g transform="translate(275,180)">
    <rect width="250" height="520" fill="#FAFAFA" stroke="#0A0A0A" stroke-width="2.5"/>
    
    <!-- Existing Building footprint: 25' x 55' = 1,375 SF -->
    <rect x="0" y="0" width="250" height="275" fill="url(#hatch)" stroke="#0A0A0A" stroke-width="1.5"/>
    <text x="125" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#0A0A0A">EXISTING BUILDING</text>
    <text x="125" y="120" text-anchor="middle" font-size="11" fill="#0A0A0A">Augustine's Salumeria</text>
    <text x="125" y="138" text-anchor="middle" font-size="11" fill="#0A0A0A">25' × 55' = 1,375 SF</text>
    <text x="125" y="154" text-anchor="middle" font-size="10" fill="#6B5F4F">(1 Story — Existing Tenant)</text>
    
    <!-- Rear Addition (Phase 4): 25' × 24' = 600 SF, +/- -->
    <rect x="0" y="275" width="250" height="120" fill="url(#hatch-new)" stroke="#0A0A0A" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="125" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#0A0A0A">REAR ADDITION (Phase 4)</text>
    <text x="125" y="340" text-anchor="middle" font-size="11" fill="#0A0A0A">25' × 24' = 600 SF</text>
    <text x="125" y="358" text-anchor="middle" font-size="10" fill="#6B5F4F">Restaurant Expansion (Conceptual)</text>
    
    <!-- Rear yard / setback -->
    <rect x="0" y="395" width="250" height="125" fill="none" stroke="#BFA133" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="125" y="445" text-anchor="middle" font-size="10" fill="#6B5F4F">REAR YARD</text>
    <text x="125" y="462" text-anchor="middle" font-size="10" fill="#6B5F4F">25' × 25' (after 10' rear setback)</text>
    <text x="125" y="480" text-anchor="middle" font-size="9" fill="#9E8729" font-style="italic">Service Access / Trash / Parking</text>
    
    <!-- Front entrance marker -->
    <polygon points="115,-2 135,-2 125,12" fill="#BFA133" stroke="#0A0A0A" stroke-width="1"/>
    <text x="125" y="-10" text-anchor="middle" font-size="9" font-weight="700" fill="#0A0A0A">MAIN ENTRY</text>
  </g>
  
  <!-- Width Dimension -->
  <g stroke="#0A0A0A" stroke-width="1">
    <line x1="275" y1="710" x2="525" y2="710"/>
    <line x1="275" y1="705" x2="275" y2="715"/>
    <line x1="525" y1="705" x2="525" y2="715"/>
  </g>
  <text x="400" y="728" text-anchor="middle" font-size="11" font-weight="700" fill="#0A0A0A">25'-0" LOT WIDTH</text>
  
  <!-- Depth Dimension - right side -->
  <g stroke="#0A0A0A" stroke-width="1">
    <line x1="545" y1="180" x2="545" y2="700"/>
    <line x1="540" y1="180" x2="550" y2="180"/>
    <line x1="540" y1="700" x2="550" y2="700"/>
  </g>
  <text x="565" y="445" text-anchor="middle" font-size="11" font-weight="700" fill="#0A0A0A" transform="rotate(90 565 445)">104'-0" LOT DEPTH</text>
  
  <!-- Existing Building Depth Dimension -->
  <g stroke="#9E8729" stroke-width="1">
    <line x1="250" y1="180" x2="250" y2="455"/>
    <line x1="245" y1="180" x2="255" y2="180"/>
    <line x1="245" y1="455" x2="255" y2="455"/>
  </g>
  <text x="234" y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#9E8729" transform="rotate(-90 234 320)">55'-0" EXISTING</text>
  
  <!-- Side neighbors -->
  <g opacity="0.3">
    <rect x="60" y="180" width="215" height="520" fill="#D8D0C2" stroke="#6B5F4F" stroke-width="0.5"/>
    <rect x="525" y="180" width="215" height="520" fill="#D8D0C2" stroke="#6B5F4F" stroke-width="0.5"/>
    <text x="167" y="350" text-anchor="middle" font-size="11" fill="#6B5F4F" font-style="italic">Adjacent</text>
    <text x="167" y="368" text-anchor="middle" font-size="11" fill="#6B5F4F" font-style="italic">3-Story Brick</text>
    <text x="167" y="386" text-anchor="middle" font-size="9" fill="#6B5F4F">(Sets context for 3-story</text>
    <text x="167" y="400" text-anchor="middle" font-size="9" fill="#6B5F4F">redevelopment height)</text>
    <text x="632" y="350" text-anchor="middle" font-size="11" fill="#6B5F4F" font-style="italic">Adjacent</text>
    <text x="632" y="368" text-anchor="middle" font-size="11" fill="#6B5F4F" font-style="italic">Commercial</text>
  </g>
  
  <!-- North arrow -->
  <g transform="translate(700,200)">
    <circle r="22" fill="#FAF6F0" stroke="#0A0A0A" stroke-width="1.5"/>
    <polygon points="0,-15 6,8 0,3 -6,8" fill="#0A0A0A"/>
    <text y="35" text-anchor="middle" font-size="11" font-weight="700" fill="#0A0A0A">N</text>
  </g>
  
  <!-- Areas Table -->
  <g transform="translate(60,770)">
    <rect width="680" height="200" fill="#FAF6F0" stroke="#0A0A0A" stroke-width="1"/>
    <text x="340" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#0A0A0A">AREA SCHEDULE — SCALE 1" = 10'</text>
    
    <line x1="0" y1="40" x2="680" y2="40" stroke="#0A0A0A" stroke-width="1"/>
    <text x="20" y="58" font-size="11" font-weight="700" fill="#0A0A0A">COMPONENT</text>
    <text x="280" y="58" font-size="11" font-weight="700" fill="#0A0A0A">DIMENSIONS</text>
    <text x="450" y="58" font-size="11" font-weight="700" fill="#0A0A0A">AREA</text>
    <text x="560" y="58" font-size="11" font-weight="700" fill="#0A0A0A">STATUS</text>
    <line x1="0" y1="65" x2="680" y2="65" stroke="#0A0A0A" stroke-width="0.5"/>
    
    <text x="20" y="85" font-size="11" fill="#0A0A0A">Lot</text>
    <text x="280" y="85" font-size="11" fill="#0A0A0A">25' × 104'</text>
    <text x="450" y="85" font-size="11" font-weight="600" fill="#0A0A0A">2,600 SF</text>
    <text x="560" y="85" font-size="11" fill="#6B5F4F" font-style="italic">Fee Simple — As-Is</text>
    
    <text x="20" y="105" font-size="11" fill="#0A0A0A">Existing Building (1 Story)</text>
    <text x="280" y="105" font-size="11" fill="#0A0A0A">25' × 55'</text>
    <text x="450" y="105" font-size="11" font-weight="600" fill="#0A0A0A">1,375 SF</text>
    <text x="560" y="105" font-size="11" fill="#1F6F3E" font-style="italic">In place (Augustine's)</text>
    
    <text x="20" y="125" font-size="11" fill="#BFA133">Rear Addition (Phase 4)</text>
    <text x="280" y="125" font-size="11" fill="#0A0A0A">25' × 24'</text>
    <text x="450" y="125" font-size="11" font-weight="600" fill="#BFA133">+ 600 SF</text>
    <text x="560" y="125" font-size="11" fill="#BFA133" font-style="italic">Conceptual — Tenant cooperation</text>
    
    <text x="20" y="145" font-size="11" fill="#0A0A0A">Combined Ground Floor (post-addition)</text>
    <text x="280" y="145" font-size="11" fill="#0A0A0A">25' × 79'</text>
    <text x="450" y="145" font-size="11" font-weight="600" fill="#0A0A0A">1,975 SF</text>
    <text x="560" y="145" font-size="11" fill="#6B5F4F" font-style="italic">Restaurant + Service</text>
    
    <line x1="0" y1="155" x2="680" y2="155" stroke="#0A0A0A" stroke-width="0.5"/>
    <text x="20" y="175" font-size="12" font-weight="700" fill="#0A0A0A">Rear Yard (after 10' setback)</text>
    <text x="280" y="175" font-size="11" fill="#0A0A0A">25' × 25'</text>
    <text x="450" y="175" font-size="11" font-weight="600" fill="#0A0A0A">625 SF</text>
    <text x="560" y="175" font-size="11" fill="#6B5F4F" font-style="italic">Service / Parking / Access</text>
  </g>
</svg>
